<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食べた分計算するやつ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .input-field {
            -moz-appearance: textfield;
        }
        .sticky-total {
            position: sticky;
            bottom: 0;
            z-index: 50;
        }
    </style>
</head>
<body class="pb-32">
    <!-- ヘッダー -->
    <header class="bg-indigo-900 text-white py-8 px-4 mb-8 text-center shadow-lg">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight">食べた分計算するやつ</h1>
        <p class="text-indigo-300 text-sm mt-2">定価と数量を入力してください</p>
    </header>

    <main class="max-w-3xl mx-auto px-4 space-y-4">
        <!-- 入力セクション -->
        <section class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 hidden md:grid grid-cols-12 gap-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                <div class="col-span-5">定価 (Price)</div>
                <div class="col-span-3 text-center">数量 (Qty)</div>
                <div class="col-span-4 text-right">小計 (Subtotal)</div>
            </div>

            <div id="calculatorRows" class="p-4 md:p-6 space-y-2">
                <!-- JavaScriptで10行生成 -->
            </div>
        </section>

        <!-- リセットボタン -->
        <div class="text-center py-4">
            <button onclick="confirmReset()" class="px-8 py-3 bg-white text-red-600 border border-red-200 font-bold rounded-full hover:bg-red-50 transition-colors shadow-sm active:scale-95">
                入力内容をクリア
            </button>
        </div>
    </main>

    <!-- フローティング合計バー（ここをご要望に合わせて変更しました） -->
    <div class="sticky-total bg-white/95 backdrop-blur-md border-t border-gray-200 shadow-[0_-10px_25px_rgba(0,0,0,0.1)] p-4 md:p-6 mt-12">
        <div class="max-w-3xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-6">
                <!-- 税抜合計 -->
                <div class="flex flex-col border-r border-gray-100 pr-6">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">税抜合計</span>
                    <div class="flex items-baseline">
                        <span class="text-xl font-bold text-gray-700" id="rawTotalDisplay">0</span>
                        <span class="text-xs text-gray-400 ml-1 font-bold">円</span>
                    </div>
                </div>
                <!-- 消費税スイッチ -->
                <div class="flex items-center space-x-3 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100">
                    <span class="text-xs font-bold text-emerald-700 whitespace-nowrap">消費税(10%)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="taxGlobal" class="sr-only peer" onchange="calculate()">
                        <div class="w-10 h-5 bg-gray-300 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-600"></div>
                    </label>
                </div>
            </div>
            
            <!-- 総合計 -->
            <div class="text-right">
                <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest block mb-1">総合計金額</span>
                <div class="text-4xl font-black text-indigo-950 leading-none">
                    <span id="grandTotalDisplay">0</span><span class="text-xl ml-1 font-medium text-indigo-400">円</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ROW_COUNT = 10;

        function init() {
            const container = document.getElementById('calculatorRows');
            for (let i = 1; i <= ROW_COUNT; i++) {
                const div = document.createElement('div');
                div.className = 'grid grid-cols-12 gap-2 md:gap-4 items-center py-2 border-b border-gray-50 last:border-0 px-2 md:px-0';
                div.innerHTML = `
                    <div class="col-span-12 md:col-span-5 flex items-center">
                        <span class="w-6 text-[10px] text-gray-300 font-mono">${i}</span>
                        <input type="number" id="price-${i}" class="w-full p-2 bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:border-indigo-500 outline-none transition-all text-sm font-medium" placeholder="定価" oninput="calculate()">
                    </div>
                    <div class="col-span-6 md:col-span-3">
                        <input type="number" id="qty-${i}" value="0" class="w-full p-2 bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:border-indigo-500 outline-none transition-all text-center text-sm font-bold text-indigo-600" oninput="calculate()">
                    </div>
                    <div class="col-span-6 md:col-span-4 text-right pr-2">
                        <span id="subtotal-${i}" class="font-mono font-bold text-slate-600 text-sm">0</span>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function calculate() {
            let totalRaw = 0;
            for (let i = 1; i <= ROW_COUNT; i++) {
                const price = parseFloat(document.getElementById(`price-${i}`).value) || 0;
                const qty = parseFloat(document.getElementById(`qty-${i}`).value) || 0;
                const sub = price * qty;
                document.getElementById(`subtotal-${i}`).textContent = sub.toLocaleString();
                totalRaw += sub;
            }

            document.getElementById('rawTotalDisplay').textContent = totalRaw.toLocaleString();

            const isTaxEnabled = document.getElementById('taxGlobal').checked;
            let finalTotal = totalRaw;
            if (isTaxEnabled) {
                finalTotal = Math.floor(totalRaw * 1.1);
            }

            document.getElementById('grandTotalDisplay').textContent = finalTotal.toLocaleString();
        }

        function confirmReset() {
            if (confirm('入力をすべてクリアしますか？')) {
                for (let i = 1; i <= ROW_COUNT; i++) {
                    document.getElementById(`price-${i}`).value = '';
                    document.getElementById(`qty-${i}`).value = '0';
                }
                document.getElementById('taxGlobal').checked = false;
                calculate();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
